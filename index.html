<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Internship Management System — Manage attendance, logbook, evaluations, and intern data with ease.">
  <title>Internship Management System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><text x='50' y='68' font-size='55' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'>IM</text></svg>">
</head>
<body>

  <!-- ========== LOGIN SCREEN ========== -->
  <div id="login-screen">
    <div class="login-wrapper">
      <div class="login-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      </div>
      <div class="login-brand">
        <h1>Intern Management</h1>
        <p>Attendance · Logbook · Evaluation</p>
      </div>
      <div class="login-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your password to sign in</p>
        <div class="input-group">
          <label for="login-password">Password</label>
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="login-password" placeholder="Enter your password" autocomplete="off">
        </div>
        <p class="login-error" id="login-error"></p>
        <button class="btn btn-primary btn-full" id="login-btn">Sign In</button>
      </div>
      <p class="login-credit">Made by Juwita</p>
    </div>
  </div>

  <!-- ========== MAIN APP ========== -->
  <div id="app" class="hidden">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </div>
        <div class="sidebar-brand">
          <h2>IMS</h2>
          <span>Intern Management</span>
        </div>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav"></nav>

      <div class="sidebar-footer">
        <div id="sidebar-user"></div>
        <button id="logout-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content">
      <header id="topbar">
        <h1 id="topbar-title">Dashboard</h1>
        <div class="topbar-right">
          <span class="topbar-date" id="topbar-date"></span>
        </div>
      </header>
      <div id="content-area"></div>
    </main>

  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/intern.js"></script>
  <script src="js/mentor.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
